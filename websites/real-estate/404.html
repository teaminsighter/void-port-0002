<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Bali Luxe Estates</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏝️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Bebas+Neue&family=DM+Sans:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4A853;
            --dark: #1A1A1A;
            --cream: #F5F0EB;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }

        .error-page {
            max-width: 540px;
        }

        .error-code {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(6rem, 20vw, 12rem);
            letter-spacing: 0.15em;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 16px;
            opacity: 0.85;
        }

        .error-line {
            width: 60px;
            height: 1px;
            background: var(--gold);
            margin: 0 auto 32px;
        }

        .error-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 300;
            margin-bottom: 16px;
        }

        .error-desc {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .error-btn {
            display: inline-block;
            padding: 16px 40px;
            background: var(--gold);
            color: var(--dark);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            text-decoration: none;
            transition: background 0.3s, transform 0.3s;
        }

        .error-btn:hover {
            background: #e8c97a;
            transform: translateY(-2px);
        }

        .error-footer {
            margin-top: 60px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.25);
        }

        .error-footer span {
            color: var(--gold);
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">404</div>
        <div class="error-line"></div>
        <h1 class="error-title">This Page Has Sailed Away</h1>
        <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back to exploring Bali's finest properties.</p>
        <a href="/" class="error-btn">Return Home</a>
        <div class="error-footer">BALI <span>LUXE</span> ESTATES</div>
    </div>
</body>
</html>
